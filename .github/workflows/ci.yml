name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    # Spin up a real PostgreSQL for Prisma to migrate/test against.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: matic
          POSTGRES_PASSWORD: matic_password
          POSTGRES_DB: matic_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U matic"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://matic:matic_password@localhost:5432/matic_test?schema=public
      JWT_ACCESS_SECRET: ci_access_secret
      JWT_REFRESH_SECRET: ci_refresh_secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Build TypeScript
        run: npm run build

      - name: Run tests
        run: npm test

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: matic-ecommerce-api:ci

  # ---------------------------------------------------------------------------
  # Deploy step — fires only on push to the default branch after tests pass.
  # Configure your host's deploy hook in repo Secrets as RENDER_DEPLOY_HOOK
  # (Render) or replace with your platform's deploy command.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build-and-test, docker-build]
    if: github.event_name == 'push'
    steps:
      - name: Trigger deployment
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
            echo "Deployment triggered."
          else
            echo "No RENDER_DEPLOY_HOOK secret set — skipping deploy."
          fi
